# CI overlay for UI scenario runner (Phase 19.1).
#
# Adds:
#   - api healthcheck (base docker-compose.yml has none)
#   - worker healthcheck using `celery inspect ping` so `docker compose up --wait`
#     blocks until the Celery worker is actually reachable (RESEARCH.md Pitfall 5)
#   - tester service using the official Microsoft Playwright Python image
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up --wait
#
# NOTE: the doubled `$$HOSTNAME` is intentional — compose interpolates single `$`.

services:
  api:
    healthcheck:
      # api image is python:3.12-slim-based and does not ship `curl`.
      # Use python urllib which is always available.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=15).status==200 else 1)\" || exit 1"]
      interval: 15s
      timeout: 20s
      retries: 10
      start_period: 30s

  worker:
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  tester:
    image: mcr.microsoft.com/playwright/python:v1.47.0-jammy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      BASE_URL: http://api:8000
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    # PYTHONPATH=/app already makes `app` and `tests` importable. No need to
    # `pip install -e .` — the project has no [project] table and setuptools
    # auto-discovery trips on the yaml-only `scenarios/` directory.
    # Install runtime deps the tester container needs that are NOT in the
    # Playwright base image (pyyaml for scenario parsing, pydantic for schema,
    # SQLAlchemy + asyncpg if scenarios hit DB helpers).
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt pytest pytest-asyncio 'playwright==1.47.0' &&
             pytest scenarios/ tests/fixtures/scenario_runner/ -v --tb=short"
