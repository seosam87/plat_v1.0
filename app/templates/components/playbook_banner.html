<div id="playbook-banner" hidden role="alert" aria-live="polite"
  style="position:sticky;top:0;z-index:30;background:#4f46e5;color:#ffffff;padding:0.75rem 1.5rem;
  display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;min-height:52px;">
  <div style="min-width:0;flex:1;">
    <div id="playbook-banner-title"
      style="font-size:1.25rem;font-weight:600;line-height:1.2;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
    <div id="playbook-banner-meta"
      style="font-size:0.875rem;font-weight:400;line-height:1.4;margin-top:0.125rem;opacity:0.9;"></div>
  </div>
  <div style="display:flex;gap:0.5rem;flex-shrink:0;">
    <button type="button" id="playbook-banner-complete"
      style="padding:0.5rem 1rem;min-height:44px;background:#ffffff;color:#4338ca;font-weight:600;font-size:0.875rem;border:none;border-radius:0.375rem;cursor:pointer;">
      Отметить выполненным
    </button>
    <button type="button" id="playbook-banner-back"
      style="padding:0.5rem 1rem;min-height:44px;background:#6366f1;color:#ffffff;font-weight:500;font-size:0.875rem;border:1px solid #818cf8;border-radius:0.375rem;cursor:pointer;">
      Вернуться к плейбуку
    </button>
  </div>
</div>
<script src="/static/js/playbook_banner.js" defer></script>
