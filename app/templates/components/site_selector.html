{# Sticky site selector — loaded in sidebar header area #}
<div class="site-selector" style="padding:0.75rem 0.75rem 0.5rem;border-bottom:1px solid #312e81;">
  <label style="display:block;font-size:0.7rem;font-weight:600;color:#a5b4fc;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem;" class="sidebar-label">Сайт</label>
  <select
    id="site-selector"
    style="width:100%;background:#eef2ff;border:1px solid #c7d2fe;border-radius:6px;padding:0.4rem 0.5rem;font-size:0.82rem;color:#1e1b4b;cursor:pointer;outline:none;"
  >
    <option value="">— выбрать сайт —</option>
  </select>
</div>
<script>
(function() {
  var sel = document.getElementById('site-selector');
  if (!sel) return;
  // Load sites once on page load
  fetch('/ui/api/sites', {credentials: 'same-origin'}).then(function(r){
    if (!r.ok) { console.error('Site selector load failed:', r.status); return ''; }
    return r.text();
  }).then(function(html) {
    if (!html) return;
    sel.innerHTML = '<option value="">— выбрать сайт —</option>' + html;
    var saved = '{{ selected_site_id or "" }}';
    if (saved) sel.value = saved;
  });
  // On change — save selection via POST, then reload to update context
  sel.addEventListener('change', function() {
    var siteId = sel.value;
    if (!siteId) return;
    fetch('/ui/api/select-site', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'site_id=' + encodeURIComponent(siteId)
    }).then(function() {
      window.location.reload();
    });
  });
})();
</script>
