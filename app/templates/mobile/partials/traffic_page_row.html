<div class="flex items-center gap-3 p-3 min-h-[44px] cursor-pointer"
  aria-label="{{ page.page_url }}: трафик {{ page.visits_delta }}"
  hx-get="/m/traffic/{{ site_id }}/task-form?prefilled_title={{ page.page_url | urlencode }}"
  hx-target="#task-form-slot"
  hx-swap="innerHTML">
  <span class="text-sm text-gray-800 flex-1 truncate">{{ page.page_url[:40] }}</span>
  {% if page.visits_delta < 0 %}
    <span class="bg-red-100 text-red-700 rounded px-2 py-0.5 text-xs font-semibold">{{ page.visits_delta }}</span>
  {% elif page.visits_delta > 0 %}
    <span class="bg-green-100 text-green-700 rounded px-2 py-0.5 text-xs font-semibold">+{{ page.visits_delta }}</span>
  {% else %}
    <span class="bg-gray-100 text-gray-500 rounded px-2 py-0.5 text-xs">0</span>
  {% endif %}
  <svg class="w-5 h-5 text-gray-400 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
</div>
