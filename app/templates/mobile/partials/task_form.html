<form
  class="bg-white rounded-lg p-4 space-y-3"
  hx-post="/m/health/{{ site_id }}/tasks"
  hx-swap="outerHTML"
  hx-target="closest form"
  hx-on::after-request="if(event.detail.successful) { this.outerHTML=''; showToast('Задача создана', 'success'); }"
>
  <input
    type="text"
    name="title"
    value="{{ prefilled_title }}"
    placeholder="Текст задачи"
    required
    class="w-full min-h-[44px] border border-gray-300 rounded-lg px-3 text-sm"
  >
  <div class="flex items-center gap-2">
    <label class="text-sm text-gray-600">Приоритет</label>
    <select name="priority" class="min-h-[44px] border border-gray-300 rounded-lg px-3 text-sm flex-1">
      <option value="p1">P1 — Critical</option>
      <option value="p2">P2 — High</option>
      <option value="p3" selected>P3 — Medium</option>
      <option value="p4">P4 — Low</option>
    </select>
  </div>
  <div class="flex gap-2">
    <button type="submit"
      class="flex-1 min-h-[44px] rounded-lg text-white font-semibold text-sm"
      style="background:#4f46e5;">
      Сохранить задачу
    </button>
    <button type="button"
      class="flex-1 min-h-[44px] rounded-lg text-sm font-semibold text-gray-600 bg-gray-100"
      onclick="document.getElementById('task-form-slot').innerHTML=''">
      Не создавать
    </button>
  </div>
</form>
