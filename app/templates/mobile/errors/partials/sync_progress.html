{% if sync_status == "running" %}
<div class="flex items-center gap-2 p-3 bg-white rounded-lg mb-4"
  hx-get="/m/errors/sync/status/{{ task_id }}?site_id={{ site_id }}"
  hx-trigger="every 3s"
  hx-swap="outerHTML">
  <svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
  </svg>
  <span class="text-sm text-gray-600">Синхронизируем ошибки...</span>
</div>
{% elif sync_status == "done" %}
<div class="flex items-center gap-2 p-3 bg-green-50 rounded-lg mb-4"
  hx-get="/m/errors/content?site_id={{ site_id }}"
  hx-trigger="load"
  hx-target="#errors-content"
  hx-swap="innerHTML">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20" class="text-green-600">
    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.06l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/>
  </svg>
  <span class="text-sm text-green-800">Обновлено</span>
</div>
{% elif sync_status == "error" %}
<div class="flex items-center gap-2 p-3 bg-red-50 rounded-lg mb-4">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="20" height="20" class="text-red-600">
    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a.75.75 0 01.75.75v4.5a.75.75 0 01-1.5 0v-4.5A.75.75 0 0110 5zm0 10a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
  </svg>
  <span class="text-sm text-red-800">Ошибка синхронизации. Попробуйте ещё раз.</span>
</div>
{% endif %}
