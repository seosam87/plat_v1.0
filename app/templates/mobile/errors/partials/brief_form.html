<div class="bg-white rounded-lg p-4 space-y-3 border-l-2 border-indigo-600" aria-live="polite">
  <div class="text-sm font-semibold text-gray-700 mb-2">{{ error.title }}</div>
  <form hx-post="/m/errors/{{ error.id }}/brief" hx-target="closest div[aria-live]" hx-swap="outerHTML">
    <div class="mb-3">
      <label class="text-xs text-gray-500 mb-1 block">Описание работ</label>
      <textarea name="description" class="w-full min-h-[100px] border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Опишите, что нужно исправить..."></textarea>
    </div>
    <div class="mb-3">
      <label class="text-xs text-gray-500 mb-1 block">Приоритет</label>
      <div class="flex gap-3">
        {% for p, label, color in [("p1","P1","red"),("p2","P2","orange"),("p3","P3","gray"),("p4","P4","blue")] %}
        <label class="cursor-pointer">
          <input type="radio" name="priority" value="{{ p }}" class="sr-only peer" {% if p == "p3" %}checked{% endif %}>
          <span class="px-3 py-1 rounded-full text-xs font-semibold border-2 block
            peer-checked:bg-{{ color }}-100 peer-checked:border-{{ color }}-500 peer-checked:text-{{ color }}-700
            border-gray-200 text-gray-400">{{ label }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
    <div class="mb-3">
      <select name="project_id" class="w-full min-h-[44px] border border-gray-300 rounded-lg px-3 py-2 text-sm">
        <option value="">— Проект (необязательно) —</option>
        {% for project in projects %}
        <option value="{{ project.id }}">{{ project.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="flex-1 min-h-[44px] rounded-lg text-white font-semibold text-sm" style="background:#4f46e5;">Сохранить</button>
      <button type="button" onclick="window.location.reload()"
        class="flex-1 min-h-[44px] rounded-lg text-sm font-semibold text-gray-600 bg-gray-100">Отмена</button>
    </div>
  </form>
</div>
