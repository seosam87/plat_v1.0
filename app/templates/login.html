<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SEO Platform</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: white; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.2); }
    h1 { margin: 0 0 1.5rem; font-size: 1.5rem; color: #1a1a2e; text-align: center; }
    label { display: block; font-size: .85rem; color: #6b7280; margin-bottom: .3rem; }
    input { width: 100%; padding: .6rem .8rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; box-sizing: border-box; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    button { width: 100%; padding: .7rem; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { color: #dc2626; font-size: .85rem; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>SEO Platform</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/ui/login">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
