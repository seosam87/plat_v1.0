{% extends "base.html" %}
{% block title %}Массовые операции — {{ site.name }} — SEO Platform{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
  <h2 class="text-lg font-semibold text-gray-800 m-0">Массовые операции: {{ site.name }}</h2>
  <a href="/ui/sites/{{ site.id }}" class="btn btn-sm">&larr; К сайту</a>
</div>

<!-- Actions bar -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 px-3 py-2 mb-4 flex gap-2 flex-wrap items-center">
  <span id="selected-count" class="font-semibold min-w-[100px]">Выбрано: 0</span>
  <select id="action-group" class="px-2 py-1 border border-gray-300 rounded text-sm bg-white">
    <option value="">Группа...</option>
    {% for g in filter_options.groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
  </select>
  <button class="btn btn-sm" onclick="moveToGroup()">В группу</button>
  <select id="action-cluster" class="px-2 py-1 border border-gray-300 rounded text-sm bg-white">
    <option value="">Кластер...</option>
    {% for c in filter_options.clusters %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
  </select>
  <button class="btn btn-sm" onclick="moveToCluster()">В кластер</button>
  <input type="text" id="action-url" placeholder="Target URL..." class="px-2 py-1 border border-gray-300 rounded text-sm w-[200px]">
  <button class="px-2 py-1 text-xs font-medium rounded bg-indigo-600 text-white hover:bg-indigo-700" onclick="assignUrl()">Назначить URL</button>
  <button class="px-2 py-1 text-xs font-medium rounded bg-red-800 text-white hover:bg-red-700" onclick="deleteSelected()">Удалить</button>
</div>

<!-- Filters -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 px-3 py-2 mb-4">
  <div class="flex gap-3 flex-wrap items-center">
    <input type="text" id="f-search" placeholder="Поиск..." class="flex-1 min-w-[150px] px-2 py-1 border border-gray-300 rounded text-sm">
    <input type="number" id="f-freq-min" placeholder="Част. от" class="w-[80px] px-2 py-1 border border-gray-300 rounded text-sm">
    <input type="number" id="f-freq-max" placeholder="Част. до" class="w-[80px] px-2 py-1 border border-gray-300 rounded text-sm">
    <select id="f-cluster" class="px-2 py-1 border border-gray-300 rounded text-sm bg-white">
      <option value="">Все кластеры</option>
      {% for c in filter_options.clusters %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
    </select>
    <select id="f-group" class="px-2 py-1 border border-gray-300 rounded text-sm bg-white">
      <option value="">Все группы</option>
      {% for g in filter_options.groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
    </select>
    <button class="px-2 py-1 text-xs font-medium rounded bg-indigo-600 text-white hover:bg-indigo-700" onclick="searchKeywords()">Найти</button>
  </div>
</div>

<!-- Keywords table -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 mb-6">
  <div class="flex justify-between items-center mb-2">
    <label class="text-sm"><input type="checkbox" id="select-all" onchange="toggleAll(this.checked)"> Выбрать все</label>
    <span id="total-count" class="text-sm text-gray-500"></span>
  </div>
  <div class="overflow-x-auto max-h-[500px] overflow-y-auto">
    <table id="kw-table" class="min-w-full divide-y divide-gray-200 text-sm">
      <thead class="bg-gray-50"><tr>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"></th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Фраза</th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Частотность</th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Позиция</th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Группа</th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Кластер</th>
        <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Target URL</th>
      </tr></thead>
      <tbody class="bg-white divide-y divide-gray-100"></tbody>
    </table>
  </div>
</div>

<!-- Export / Import -->
<div class="flex gap-4 mb-6 flex-wrap">
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 flex-1 min-w-[250px]">
    <h3 class="text-base font-semibold text-gray-800 m-0 mb-3">Экспорт</h3>
    <div class="flex gap-2">
      <a id="export-csv" href="/bulk/{{ site.id }}/export?format=csv" class="px-3 py-1.5 text-sm font-medium rounded bg-emerald-600 text-white hover:bg-emerald-700" onclick="this.href=buildExportUrl('csv');return true">Экспорт CSV</a>
      <a id="export-xlsx" href="/bulk/{{ site.id }}/export?format=xlsx" class="px-3 py-1.5 text-sm font-medium rounded bg-blue-600 text-white hover:bg-blue-700" onclick="this.href=buildExportUrl('xlsx');return true">Экспорт XLSX</a>
    </div>
  </div>
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 flex-1 min-w-[250px]">
    <h3 class="text-base font-semibold text-gray-800 m-0 mb-3">Импорт</h3>
    <form id="import-form" enctype="multipart/form-data">
      <div class="flex gap-2 items-center mb-2">
        <input type="file" name="file" accept=".csv,.xlsx">
        <select name="on_duplicate" class="px-2 py-1 border border-gray-300 rounded text-sm bg-white">
          <option value="skip">Пропустить дубли</option>
          <option value="update">Обновить дубли</option>
          <option value="replace">Заменить дубли</option>
        </select>
      </div>
      <button type="button" class="px-3 py-1.5 text-sm font-medium rounded bg-amber-600 text-white hover:bg-amber-700" onclick="importFile()">Импортировать</button>
      <span id="import-status" class="text-sm ml-2"></span>
    </form>
  </div>
</div>

<script>
const SITE_ID = '{{ site.id }}';
let selectedIds = new Set();

function getSelectedIds() { return [...selectedIds]; }
function updateCount() { document.getElementById('selected-count').textContent = `Выбрано: ${selectedIds.size}`; }
function toggleAll(checked) { document.querySelectorAll('.kw-cb').forEach(cb => { cb.checked = checked; checked ? selectedIds.add(cb.dataset.id) : selectedIds.delete(cb.dataset.id); }); updateCount(); }

async function searchKeywords() {
  const params = new URLSearchParams();
  const map = {search:'f-search', frequency_min:'f-freq-min', frequency_max:'f-freq-max', cluster_id:'f-cluster', group_id:'f-group'};
  for (const [k,id] of Object.entries(map)) { const v = document.getElementById(id).value; if (v) params.set(k, v); }
  const resp = await fetch(`/analytics/sites/${SITE_ID}/keywords?${params}`);
  const data = await resp.json();
  document.getElementById('total-count').textContent = `Найдено: ${data.total}`;
  const tbody = document.querySelector('#kw-table tbody');
  tbody.innerHTML = '';
  selectedIds.clear();
  for (const kw of data.items) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="px-3 py-2"><input type="checkbox" class="kw-cb" data-id="${kw.id}" onchange="this.checked?selectedIds.add(this.dataset.id):selectedIds.delete(this.dataset.id);updateCount()"></td><td class="px-3 py-2">${kw.phrase}</td><td class="px-3 py-2">${kw.frequency||'—'}</td><td class="px-3 py-2">${kw.latest_position||'—'}</td><td class="px-3 py-2">${kw.group_name||'—'}</td><td class="px-3 py-2">${kw.cluster_name||'—'}</td><td class="px-3 py-2 max-w-[150px] overflow-hidden text-ellipsis">${kw.target_url||'—'}</td>`;
    tbody.appendChild(tr);
  }
  updateCount();
}

function buildExportUrl(format) {
  const params = new URLSearchParams({format});
  const map = {search:'f-search', frequency_min:'f-freq-min', frequency_max:'f-freq-max', cluster_id:'f-cluster', group_id:'f-group'};
  for (const [k,id] of Object.entries(map)) { const v = document.getElementById(id).value; if (v) params.set(k, v); }
  return `/bulk/${SITE_ID}/export?${params}`;
}

async function moveToGroup() {
  const ids = getSelectedIds(); const gid = document.getElementById('action-group').value;
  if (!ids.length) { alert('Выберите ключи'); return; }
  await fetch(`/bulk/${SITE_ID}/move-group`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword_ids:ids, group_id:gid||null})});
  searchKeywords();
}

async function moveToCluster() {
  const ids = getSelectedIds(); const cid = document.getElementById('action-cluster').value;
  if (!ids.length) { alert('Выберите ключи'); return; }
  await fetch(`/bulk/${SITE_ID}/move-cluster`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword_ids:ids, cluster_id:cid||null})});
  searchKeywords();
}

async function assignUrl() {
  const ids = getSelectedIds(); const url = document.getElementById('action-url').value;
  if (!ids.length || !url) { alert('Выберите ключи и введите URL'); return; }
  await fetch(`/bulk/${SITE_ID}/assign-url`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword_ids:ids, target_url:url})});
  searchKeywords();
}

async function deleteSelected() {
  const ids = getSelectedIds();
  if (!ids.length) { alert('Выберите ключи'); return; }
  if (!confirm(`Удалить ${ids.length} ключей?`)) return;
  await fetch(`/bulk/${SITE_ID}/delete`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({keyword_ids:ids})});
  searchKeywords();
}

async function importFile() {
  const form = document.getElementById('import-form');
  const resp = await fetch(`/bulk/${SITE_ID}/import`, {method:'POST', body: new FormData(form)});
  const data = await resp.json();
  document.getElementById('import-status').innerHTML = `<span class="text-emerald-600">Добавлено: ${data.added}, обновлено: ${data.updated}, пропущено: ${data.skipped}</span>`;
}

searchKeywords();
</script>
{% endblock %}
