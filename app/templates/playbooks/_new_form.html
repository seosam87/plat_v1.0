<form method="post" action="/ui/playbooks/new" class="bg-gray-50 rounded-lg p-4 mb-4">
  <div class="flex gap-3 flex-wrap items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Название</label>
      <input type="text" name="name" required
             class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <div class="min-w-[160px]">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Категория</label>
      <select name="category"
              class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded bg-white focus:ring-indigo-500 focus:border-indigo-500">
        <option value="">—</option>
        {% for c in all_categories %}
        <option value="{{ c.value }}">
          {% if c.value == "commerce" %}Коммерция
          {% elif c.value == "content" %}Контент
          {% elif c.value == "technical" %}Технический
          {% else %}Смешанный{% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    <label class="inline-flex items-center gap-2 text-sm">
      <input type="checkbox" name="is_published" checked> Опубликован
    </label>
    <button type="submit"
            class="px-3 py-1.5 text-sm font-medium rounded bg-indigo-600 text-white hover:bg-indigo-700">
      Создать и открыть билдер
    </button>
  </div>
  <div class="mt-3">
    <label class="block text-xs font-semibold text-gray-600 mb-1">Описание (Markdown, необязательно)</label>
    <textarea name="description_md" rows="2"
              class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:ring-indigo-500 focus:border-indigo-500"></textarea>
  </div>
</form>
