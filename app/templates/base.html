<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SEO Platform{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>
    /* --- Reset & Base --- */
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }

    /* --- Sidebar --- */
    #sidebar { position: fixed; top: 0; left: 0; width: 16rem; height: 100vh; background: #1e1b4b; color: white; display: flex; flex-direction: column; z-index: 40; overflow: hidden; transition: width 0.2s; }
    #sidebar .sidebar-section-header { cursor: pointer; }
    #sidebar .sidebar-section-header.active { background: #3730a3 !important; }
    #sidebar .sidebar-child.active { background: #4338ca !important; color: white !important; font-weight: 600 !important; }
    .site-selector select { width: 100%; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 6px; padding: 0.4rem 0.5rem; font-size: 0.82rem; color: #1e1b4b; cursor: pointer; outline: none; }

    /* --- Main content --- */
    .main-content { margin-left: 16rem; padding: 1.5rem 2rem; min-height: 100vh; }

    /* --- Responsive --- */
    @media (max-width: 1023px) {
      #sidebar { width: 4rem; }
      #sidebar .sidebar-label,
      #sidebar .sidebar-child-label,
      #sidebar .site-selector,
      #sidebar .sidebar-footer-text { display: none; }
      #sidebar:hover { width: 16rem; }
      #sidebar:hover .sidebar-label,
      #sidebar:hover .sidebar-child-label,
      #sidebar:hover .site-selector,
      #sidebar:hover .sidebar-footer-text { display: block; }
      .main-content { margin-left: 4rem; }
    }
    @media (max-width: 767px) {
      #sidebar { transform: translateX(-100%); width: 16rem; position: fixed; z-index: 50; transition: transform 0.3s; }
      #sidebar.mobile-open { transform: translateX(0); }
      #sidebar .sidebar-label,
      #sidebar .sidebar-child-label,
      #sidebar .site-selector,
      #sidebar .sidebar-footer-text { display: block; }
      .main-content { margin-left: 0; padding-top: 3.5rem; }
      .mobile-hamburger { display: flex !important; }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 45; }
      .sidebar-overlay.active { display: block; }
    }

    /* --- Preserved existing classes (child templates depend on these) --- */
    .card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .75rem 1rem; border-bottom: 1px solid #e5e7eb; }
    th { font-weight: 600; color: #6b7280; font-size: .875rem; text-transform: uppercase; }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 9999px; font-size: .8rem; font-weight: 600; }
    .badge-connected { background: #d1fae5; color: #065f46; }
    .badge-failed { background: #fee2e2; color: #991b1b; }
    .badge-unknown { background: #f3f4f6; color: #6b7280; }
    .btn { padding: .4rem .9rem; border: none; border-radius: 4px; cursor: pointer; font-size: .875rem; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-sm { padding: .25rem .6rem; font-size: .8rem; }
    .btn-verify { background: #0ea5e9; color: white; }
    form.inline { display: inline; }
    .htmx-indicator { opacity: 0; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .breadcrumbs { font-size:.85rem; color:#6b7280; margin-bottom:1rem; }
    .breadcrumbs a { color:#4f46e5; text-decoration:none; }
    .breadcrumbs a:hover { text-decoration:underline; }
    .breadcrumbs span { margin:0 .4rem; }
    #toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; display:flex; flex-direction:column; gap:.5rem; }
    .toast { padding:.75rem 1.25rem; border-radius:6px; box-shadow:0 2px 8px rgba(0,0,0,.15); font-size:.9rem; animation:toastIn .3s ease; max-width:400px; }
    .toast-success { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .toast-error { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .toast-info { background:#eff6ff; color:#1e40af; border:1px solid #bfdbfe; }
    @keyframes toastIn { from{opacity:0;transform:translateY(1rem)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <!-- Mobile hamburger (hidden on desktop) -->
  <button class="mobile-hamburger" style="display:none;position:fixed;top:0.75rem;left:0.75rem;z-index:55;background:#1e1b4b;color:white;border:none;border-radius:6px;padding:0.5rem;cursor:pointer;" onclick="toggleMobileSidebar()">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
  </button>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

  {% include "components/sidebar.html" %}

  <div class="main-content">
    {% include "components/breadcrumb.html" %}
    {% block breadcrumbs %}{% endblock %}
    {% block content %}{% endblock %}
  </div>

  <!-- Server log panel (preserved from previous base.html) -->
  <div id="log-panel" style="position:fixed;bottom:0;left:16rem;right:0;z-index:50;background:#1a1a2e;color:#e5e7eb;transition:height .3s">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem 1rem;cursor:pointer;border-top:1px solid #374151" onclick="toggleLogPanel()">
      <span style="font-size:.8rem;font-weight:600">Server Log</span>
      <span id="log-toggle-icon" style="font-size:.8rem">&#9650;</span>
    </div>
    <div id="log-content" style="display:none;max-height:200px;overflow-y:auto;padding:.5rem 1rem"
         hx-get="/ui/logs?lines=40" hx-trigger="revealed" hx-swap="innerHTML">
    </div>
  </div>
  <div style="height:32px"></div>
  <div id="toast-container"></div>
  <script>
  function showToast(msg, type) {
    type = type || 'info';
    var c = document.getElementById('toast-container');
    var t = document.createElement('div');
    t.className = 'toast toast-' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){ t.remove(); }, 300); }, 4000);
  }
  document.body.addEventListener('htmx:responseError', function(e) {
    showToast('Server error: ' + (e.detail.xhr.status || 'unknown'), 'error');
  });
  function toggleLogPanel() {
    var c = document.getElementById('log-content');
    var icon = document.getElementById('log-toggle-icon');
    if (c.style.display === 'none') {
      c.style.display = 'block';
      icon.innerHTML = '&#9660;';
      htmx.trigger(c, 'revealed');
    } else {
      c.style.display = 'none';
      icon.innerHTML = '&#9650;';
    }
  }
  document.body.addEventListener('showToast', function(e) {
    var d = e.detail || {};
    showToast(d.msg || 'Done', d.type || 'info');
  });

  /* Sidebar section toggle */
  function toggleSection(sectionId) {
    var children = document.getElementById('children-' + sectionId);
    var chevron = document.getElementById('chevron-' + sectionId);
    if (children) {
      var isOpen = children.style.display !== 'none';
      children.style.display = isOpen ? 'none' : 'block';
      if (chevron) {
        chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
      }
    }
  }

  /* Mobile sidebar toggle */
  function toggleMobileSidebar() {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
  }
  </script>
  {% if help_module %}
  {% with hm=help_module %}
  {% include "help/_modal.html" %}
  {% endwith %}
  {% endif %}
</body>
</html>
